name: Deploy Opsight API

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: opsight-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read APP_VERSION
        id: version
        run: |
          APP_VERSION=$(grep '^APP_VERSION=' .env.example | cut -d '=' -f2 | tr -d '\r')
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "image=${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: Build image
        run: docker build -t ${{ steps.version.outputs.image }} .

      - name: Push image
        run: docker push ${{ steps.version.outputs.image }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          imageToDeploy: ${{ steps.version.outputs.image }}